# ─────────────────────────────────────────────────────────────────────────────
# PROD override — Traefik routing, SSL via Let's Encrypt, no exposed ports.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Replace ALL occurrences of:
#   example.com  → your actual domain (e.g. mysite.de)
#   myapp        → unique short name, no dots or spaces (e.g. mysite)
#   3000         → the port your container listens on internally
# ─────────────────────────────────────────────────────────────────────────────

services:
  myapp:
    restart: unless-stopped
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"

      # ── Main domain: example.com ──────────────────────────────────────────
      - "traefik.http.routers.myapp.rule=Host(`example.com`)"
      - "traefik.http.routers.myapp.entrypoints=websecure"
      - "traefik.http.routers.myapp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.myapp.service=myapp-svc"
      - "traefik.http.routers.myapp.middlewares=security-headers@file,compress@file"

      # ── www → non-www redirect (301) ──────────────────────────────────────
      - "traefik.http.routers.myapp-www.rule=Host(`www.example.com`)"
      - "traefik.http.routers.myapp-www.entrypoints=websecure"
      - "traefik.http.routers.myapp-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.myapp-www.service=myapp-svc"
      - "traefik.http.routers.myapp-www.middlewares=www-redirect@file"

      # ── Internal container port ───────────────────────────────────────────
      - "traefik.http.services.myapp-svc.loadbalancer.server.port=3000"

# Reference the proxy network — do NOT redefine it here.
# The proxy project creates and owns this network.
networks:
  proxy-network:
    external: true
    name: proxy-network
