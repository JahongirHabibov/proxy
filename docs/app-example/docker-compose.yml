# ─────────────────────────────────────────────────────────────────────────────
# BASE — shared between all environments.
# Do NOT run directly. Always combine with an override:
#
#   Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Before using, replace ALL occurrences of:
#   your-app-image:latest  → your actual image
#   myapp                  → unique short name, no dots or spaces (e.g. mysite)
#   3000                   → the port your container listens on internally
# ─────────────────────────────────────────────────────────────────────────────

services:
  myapp:
    image: your-app-image:latest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
