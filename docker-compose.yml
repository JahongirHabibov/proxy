services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      EVENTS: 1
      PING: 1
    networks:
      - socket-proxy-internal

  traefik:
    image: traefik:v3.7.5
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - socket-proxy
    environment:
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
      - TRAEFIK_PROVIDERS_DOCKER_NETWORK=${NETWORK_NAME:-proxy-network}
    command:
      - "--configfile=/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/config:/config:ro
      - ./traefik/acme.json:/acme.json
    networks:
      - proxy-network
      - socket-proxy-internal
    labels:
      - "traefik.enable=true"
      # Dashboard router — secured with BasicAuth
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth,security-headers@file,rate-limit-strict@file"
      # BasicAuth middleware — credentials set via DASHBOARD_USERS in .env
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${DASHBOARD_USERS}"

networks:
  proxy-network:
    name: ${NETWORK_NAME:-proxy-network}
    driver: bridge
  socket-proxy-internal:
    internal: true
