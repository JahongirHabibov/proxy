http:
  middlewares:
    # www → non-www permanent redirect (301)
    # Usage in app labels: traefik.http.routers.myapp-www.middlewares=www-redirect@file
    www-redirect:
      redirectRegex:
        regex: "^https://www\\.(.+)"
        replacement: "https://${1}"
        permanent: true

    # Security headers applied to all production HTTPS routers
    # Usage in app labels: traefik.http.routers.myapp.middlewares=security-headers@file
    security-headers:
      headers:
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"

    # gzip + brotli compression for text responses (replaces nginx gzip)
    # Usage in app labels: traefik.http.routers.myapp.middlewares=compress@file
    compress:
      compress:
        includedContentTypes:
          - text/html
          - text/css
          - text/javascript
          - application/javascript
          - application/json
          - application/xml
          - image/svg+xml

    # General rate limit for public-facing services
    # 100 req/s avg, burst up to 200 — protects against light DoS
    # Usage: traefik.http.routers.myapp.middlewares=rate-limit@file
    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Strict rate limit for auth/admin endpoints (dashboard, login pages)
    # 20 req/s avg, burst 30 — prevents brute-force
    # Usage: traefik.http.routers.myapp.middlewares=rate-limit-strict@file
    rate-limit-strict:
      rateLimit:
        average: 20
        burst: 30
        period: 1s
        sourceCriterion:
          ipStrategy:
            depth: 1
